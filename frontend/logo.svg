<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1730;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0f17;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b6dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#9b6dff;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="42" ry="42" fill="url(#bgGrad)"/>

  <!-- Subtle border glow -->
  <rect width="200" height="200" rx="42" ry="42" fill="none"
        stroke="rgba(108,99,255,0.18)" stroke-width="1.5"/>

  <!-- Corner accent dots -->
  <circle cx="34" cy="34" r="2.5" fill="rgba(108,99,255,0.45)"/>
  <circle cx="166" cy="34" r="2.5" fill="rgba(108,99,255,0.45)"/>
  <circle cx="34" cy="166" r="2.5" fill="rgba(108,99,255,0.45)"/>
  <circle cx="166" cy="166" r="2.5" fill="rgba(108,99,255,0.45)"/>

  <!-- Neural network connection lines -->
  <line x1="82" y1="77" x2="100" y2="97" stroke="rgba(155,109,255,0.3)" stroke-width="1.3"/>
  <line x1="118" y1="77" x2="100" y2="97" stroke="rgba(155,109,255,0.3)" stroke-width="1.3"/>
  <line x1="68" y1="105" x2="100" y2="97" stroke="rgba(155,109,255,0.22)" stroke-width="1.1"/>
  <line x1="132" y1="105" x2="100" y2="97" stroke="rgba(155,109,255,0.22)" stroke-width="1.1"/>
  <line x1="100" y1="97" x2="100" y2="117" stroke="rgba(155,109,255,0.4)" stroke-width="1.6"/>
  <line x1="82" y1="123" x2="100" y2="117" stroke="rgba(155,109,255,0.3)" stroke-width="1.3"/>
  <line x1="118" y1="123" x2="100" y2="117" stroke="rgba(155,109,255,0.3)" stroke-width="1.3"/>

  <!-- Chat bubble shape (with tail) -->
  <path d="M58 82 Q58 64 76 64 L124 64 Q142 64 142 82 L142 112 Q142 130 124 130 L110 130 L100 144 L90 130 L76 130 Q58 130 58 112 Z"
        fill="url(#iconGrad)" filter="url(#softGlow)" opacity="0.93"/>

  <!-- Highlight on bubble top-left -->
  <path d="M70 70 Q72 64 82 64 L110 64 Q118 64 118 70"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>

  <!-- Neural network nodes (outer ring) -->
  <circle cx="82" cy="77" r="5.5" fill="white" filter="url(#glow)" opacity="0.9"/>
  <circle cx="118" cy="77" r="5.5" fill="white" filter="url(#glow)" opacity="0.9"/>
  <circle cx="68" cy="105" r="4.5" fill="white" filter="url(#glow)" opacity="0.8"/>
  <circle cx="132" cy="105" r="4.5" fill="white" filter="url(#glow)" opacity="0.8"/>
  <circle cx="82" cy="123" r="4.5" fill="white" filter="url(#glow)" opacity="0.8"/>
  <circle cx="118" cy="123" r="4.5" fill="white" filter="url(#glow)" opacity="0.8"/>

  <!-- Central node (larger, brightest) -->
  <circle cx="100" cy="97" r="8" fill="white" filter="url(#glow)" opacity="1"/>
  <!-- Inner highlight on central node -->
  <circle cx="97" cy="94" r="3" fill="white" opacity="0.45"/>

  <!-- Bottom node -->
  <circle cx="100" cy="117" r="5.5" fill="white" filter="url(#glow)" opacity="0.92"/>
</svg>
